name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # PyTorch CPU-only (경량, CI용)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy matplotlib dataclasses-json
          pip install pytest pytest-cov pytest-timeout
          # gpytorch은 optional — 없으면 GP 테스트 스킵
          pip install gpytorch || echo "gpytorch install failed, GP tests will be skipped"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --override-ini="addopts=" \
            --timeout=120 --tb=short
        timeout-minutes: 15

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (syntax errors & undefined names)
        run: |
          flake8 mppi_controller/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (style warnings)
        run: |
          flake8 mppi_controller/ --count --exit-zero \
            --max-complexity=15 --max-line-length=120 --statistics
